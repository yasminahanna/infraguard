name: InfraGuard CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  detection-tests:
    name: Detection IEP Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/detection_iep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Detection tests
        run: pytest

  hotspot-tests:
    name: Hotspot IEP Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/hotspot_iep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Hotspot tests
        run: pytest

  recommender-tests:
    name: Recommender IEP Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/recommender_iep

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Recommender tests
        run: pytest


  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build services
        run: docker compose build
  
  eval-data-check:
    name: Golden Eval Data Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate golden recommender cases
        run: python evals/validate_golden_cases.py
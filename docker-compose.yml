services:
  eep-gateway:
    build: ./services/eep_gateway
    container_name: infraguard-eep
    ports:
      - "8000:8000"
    environment:
      API_KEY: ${API_KEY}
      DETECTION_IEP_URL: http://detection-iep:8001
      HOTSPOT_IEP_URL: http://hotspot-iep:8002
      RECOMMENDER_IEP_URL: http://recommender-iep:8003
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS}
      MAX_FRAMES_PER_REQUEST: ${MAX_FRAMES_PER_REQUEST}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS}
      REQUIRE_SUPABASE_AUTH: ${REQUIRE_SUPABASE_AUTH}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_ADMIN_EMAILS: ${SUPABASE_ADMIN_EMAILS}
    volumes:
      - report_store:/app/sample_data
    depends_on:
      - detection-iep
      - hotspot-iep
      - recommender-iep
    networks:
      infraguard-net:
        aliases:
          - eep-gateway

  detection-iep:
    build: ./services/detection_iep
    container_name: infraguard-detection-iep
    ports:
      - "8001:8001"
    networks:
      infraguard-net:
        aliases:
          - detection-iep

  hotspot-iep:
    build: ./services/hotspot_iep
    container_name: infraguard-hotspot-iep
    ports:
      - "8002:8002"
    networks:
      infraguard-net:
        aliases:
          - hotspot-iep

  recommender-iep:
    build: ./services/recommender_iep
    container_name: infraguard-recommender-iep
    ports:
      - "8003:8003"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS}
      WEB_SEARCH_ENABLED: ${WEB_SEARCH_ENABLED}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      WEB_SEARCH_MAX_RESULTS: ${WEB_SEARCH_MAX_RESULTS}
      HOTSPOT_IEP_URL: http://hotspot-iep:8002
      DETECTION_IEP_URL: http://detection-iep:8001
      EVENTS_PATH: /app/samples/events_sample.json
      REPORT_STORE_PATH: /app/sample_data/daily_report_sample.json
      ADDED_EVENTS_PATH: /app/sample_data/added_events.json
      CAMERA_CLIP_DIR: /app/sample_data/clips
    volumes:
      - report_store:/app/sample_data
      - ./samples:/app/samples:ro
    depends_on:
      - hotspot-iep
    networks:
      infraguard-net:
        aliases:
          - recommender-iep

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    container_name: infraguard-frontend
    ports:
      - "5173:80"
    depends_on:
      - eep-gateway
    networks:
      infraguard-net:
        aliases:
          - frontend

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: infraguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - eep-gateway
      - detection-iep
      - hotspot-iep
      - recommender-iep
    networks:
      infraguard-net:
        aliases:
          - prometheus

  grafana:
    image: grafana/grafana:11.2.0
    container_name: infraguard-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
    networks:
      infraguard-net:
        aliases:
          - grafana

volumes:
  report_store:

networks:
  infraguard-net:
    name: infraguard-net
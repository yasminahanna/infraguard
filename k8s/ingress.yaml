apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infraguard-ingress
  namespace: infraguard
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: infraguard.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eep-gateway
                port:
                  number: 8000